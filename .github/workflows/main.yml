# NutriBudget CI/CD pipeline
# Compiles static musl binaries for three architectures on every push to main,
# then publishes them as a public GitHub Release so anyone can download them.
# Reference workflow for cross-compilation setup:
# https://github.com/24W-GBAC/commr/blob/main/.github/workflows/main.yml

name: Build and release binaries

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          # Required target
          - target: aarch64-unknown-linux-musl
            binary_name: nutribudget-aarch64

          # Bonus target: standard 64-bit Linux
          - target: x86_64-unknown-linux-musl
            binary_name: nutribudget-x86_64

          # Bonus target: 32-bit ARM for older Raspberry Pi and similar
          - target: armv7-unknown-linux-musleabihf
            binary_name: nutribudget-armv7

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tool
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary with cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename binary for artifact upload
        run: |
          cp target/${{ matrix.target }}/release/nutribudget \
             ${{ matrix.binary_name }}

      - name: Upload binary as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary_name }}
          path: ${{ matrix.binary_name }}
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all built binaries
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Publish binaries to the latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: >
            Automatically built static binaries from the most recent push
            to main. Download the file matching your system, then run
            chmod +x on it and execute it from the terminal.
          files: binaries/*
